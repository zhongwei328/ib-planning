<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>职业兴趣报告生成器 · IB Planning</title>
<style>
:root {
  --bg: #0f172a; --bg-elev: #1e293b; --bg-card: #1a2540;
  --text: #f1f5f9; --text-dim: #94a3b8;
  --i: #6366f1; --s: #10b981; --r: #f59e0b; --a: #ec4899; --e: #8b5cf6; --c: #64748b;
  --border: #334155; --radius: 10px;
  --accent: #6366f1;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7;
  padding: 24px 16px 60px; max-width: 860px; margin: 0 auto; }

/* ── INPUT PHASE ── */
.input-wrap { max-width: 640px; margin: 0 auto; }
.logo { text-align: center; margin-bottom: 32px; }
.logo-emoji { font-size: 48px; }
.logo h1 { font-size: 22px; margin: 8px 0 4px; }
.logo p { color: var(--text-dim); font-size: 13px; }

.section { background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.section-title { font-size: 14px; font-weight: 700; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; }
.section-title span { font-size: 16px; }

.info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.info-row.full { grid-template-columns: 1fr; }
label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 5px; }
input[type="text"], input[type="number"] {
  width: 100%; background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 14px;
  outline: none; transition: border-color 0.2s; }
input:focus { border-color: var(--accent); }

.holland-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.dim-row { background: var(--bg-elev); border-radius: 8px; padding: 12px; }
.dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dim-name { font-size: 13px; font-weight: 600; }
.dim-code { font-size: 11px; color: var(--text-dim); }
.dim-pct { font-size: 14px; font-weight: 700; min-width: 38px; text-align: right; }
input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 6px; }
input[type="range"].r { accent-color: var(--r); }
input[type="range"].s { accent-color: var(--s); }
input[type="range"].i { accent-color: var(--i); }
input[type="range"].a { accent-color: var(--a); }
input[type="range"].e { accent-color: var(--e); }
input[type="range"].c { accent-color: var(--c); }

.mbti-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mbti-pair { background: var(--bg-elev); border-radius: 8px; padding: 14px; }
.mbti-label { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; text-align: center; }
.mbti-label strong { color: var(--text); font-size: 14px; }
.mbti-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mbti-btn { background: var(--bg-card); border: 2px solid var(--border);
  border-radius: 6px; padding: 8px; font-size: 14px; font-weight: 600;
  color: var(--text-dim); cursor: pointer; transition: all 0.2s; text-align: center; }
.mbti-btn:hover { border-color: var(--accent); color: var(--text); }
.mbti-btn.selected { background: rgba(99,102,241,0.15); border-color: var(--accent); color: #a5b4fc; }

.btn-row { display: flex; gap: 12px; }
.btn { flex: 1; padding: 13px; border-radius: 8px; font-size: 15px; font-weight: 700;
  cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #4f46e5; }
.btn-secondary { background: var(--bg-elev); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }

/* ── REPORT PHASE ── */
.report-wrap { display: none; }
.report-header { text-align: center; margin-bottom: 28px; }
.report-header h1 { font-size: 22px; margin-bottom: 6px; }
.report-header .meta { color: var(--text-dim); font-size: 13px; }

.badge-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
.badge-card { background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 32px; text-align: center; }
.badge-big { font-size: 64px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
.badge-sub { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
.badge-card .tags { margin-top: 10px; display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.tag-i { background: rgba(99,102,241,0.25); color: #a5b4fc; }
.tag-s { background: rgba(16,185,129,0.25); color: #6ee7b7; }
.tag-r { background: rgba(245,158,11,0.25); color: #fcd34d; }
.tag-a { background: rgba(236,72,153,0.25); color: #f9a8d4; }
.tag-e { background: rgba(139,92,246,0.25); color: #d8b4fe; }
.tag-c { background: rgba(100,116,139,0.25); color: #cbd5e1; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.card { background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; }
h2 { font-size: 16px; margin: 28px 0 12px; padding-bottom: 8px;
  border-bottom: 2px solid var(--border); }
h3 { font-size: 14px; margin-bottom: 10px; color: #cbd5e1; }

.bar-wrap { margin: 5px 0; }
.bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-bottom: 3px; }
.bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; }

.prof-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px; }
.prof-item { background: var(--bg-elev); border-radius: 8px; padding: 14px;
  border-left: 3px solid var(--border); }
.prof-item .tag { margin-bottom: 8px; }
.prof-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.prof-hint { font-size: 11px; color: var(--text-dim); }

.highlight-box { background: linear-gradient(135deg,
  rgba(99,102,241,0.12) 0%, rgba(16,185,129,0.12) 100%);
  border-left: 4px solid var(--i); border-radius: 6px; padding: 12px 16px;
  margin: 12px 0; font-size: 13px; }
.warning-box { background: rgba(239,68,68,0.1);
  border-left: 3px solid #ef4444; border-radius: 4px; padding: 10px 14px;
  font-size: 13px; color: #fca5a5; margin: 12px 0; }

.pill { display: inline-block; background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 10px; font-size: 11px; margin: 2px; }

ul { padding-left: 16px; }
li { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }

.footer { text-align: center; margin-top: 40px; padding-top: 16px;
  border-top: 1px solid var(--border); font-size: 12px; color: var(--text-dim); }

#reportPhase .card { margin-bottom: 0; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .holland-grid { grid-template-columns: 1fr; }
  .mbti-grid { grid-template-columns: 1fr; }
}
.chip-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: 18px; font-size: 13px; cursor: pointer; user-select: none;
  transition: all 0.15s; color: var(--text-dim); margin: 3px;
}
.chip-btn:hover { border-color: var(--accent); color: var(--text); }
.chip-btn.selected { background: rgba(99,102,241,0.2); border-color: var(--accent); color: #a5b4fc; font-weight: 600; }
.chip-section-label {
  font-size: 13px; font-weight: 600; color: var(--text); margin: 12px 0 6px;
  display: block;
}
.chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
input[type="range"] { -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px; border-radius: 3px; background: var(--bg); outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.work-slider-row { display: grid; grid-template-columns: 70px 1fr 70px; gap: 8px; align-items: center; margin: 6px 0; }
.work-slider-label { font-size: 12px; color: var(--text-dim); text-align: right; }
  .grid, .grid-3, .prof-grid { grid-template-columns: 1fr; }
  .info-row { grid-template-columns: 1fr; }
  .badge-row { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<!-- ══════════ INPUT PHASE ══════════ -->
<div id="inputPhase" class="input-wrap">
  <div class="logo">
    <div class="logo-emoji">🧭</div>
    <h1>职业兴趣报告生成器</h1>
    <p>Holland × MBTI · 3分钟生成专属分析</p>
  </div>

  <!-- 基本信息 -->
  <div class="section">
    <div class="section-title"><span>👤</span>基本信息</div>
    <div class="info-row">
      <div>
        <label>姓名 / 代号</label>
        <input type="text" id="inputName" placeholder="例如：Henry" />
      </div>
      <div>
        <label>年级（选填）</label>
        <input type="text" id="inputGrade" placeholder="例如：G7 IB" />
      </div>
    </div>
    <div class="info-row full">
      <div>
        <label>报告日期</label>
        <input type="text" id="inputDate" readonly style="cursor:default;opacity:0.7;" />
      </div>
    </div>
  </div>

  <!-- Holland 六维 -->
  <div class="section">
    <div class="section-title"><span>📊</span>Holland 职业兴趣（6维度）</div>
    <div class="holland-grid">
      <div class="dim-row">
        <div class="dim-header">
          <span class="dim-name">调研型 <span class="dim-code">Investigative</span></span>
          <span class="dim-pct" id="pctI">70%</span>
        </div>
        <input type="range" class="i" id="slI" min="0" max="100" value="70" oninput="updatePct('I',this.value)" />
      </div>
      <div class="dim-row">
        <div class="dim-header">
          <span class="dim-name">社会型 <span class="dim-code">Social</span></span>
          <span class="dim-pct" id="pctS">60%</span>
        </div>
        <input type="range" class="s" id="slS" min="0" max="100" value="60" oninput="updatePct('S',this.value)" />
      </div>
      <div class="dim-row">
        <div class="dim-header">
          <span class="dim-name">实际型 <span class="dim-code">Realistic</span></span>
          <span class="dim-pct" id="pctR">50%</span>
        </div>
        <input type="range" class="r" id="slR" min="0" max="100" value="50" oninput="updatePct('R',this.value)" />
      </div>
      <div class="dim-row">
        <div class="dim-header">
          <span class="dim-name">艺术型 <span class="dim-code">Artistic</span></span>
          <span class="dim-pct" id="pctA">40%</span>
        </div>
        <input type="range" class="a" id="slA" min="0" max="100" value="40" oninput="updatePct('A',this.value)" />
      </div>
      <div class="dim-row">
        <div class="dim-header">
          <span class="dim-name">企业型 <span class="dim-code">Enterprising</span></span>
          <span class="dim-pct" id="pctE">30%</span>
        </div>
        <input type="range" class="e" id="slE" min="0" max="100" value="30" oninput="updatePct('E',this.value)" />
      </div>
      <div class="dim-row">
        <div class="dim-header">
          <span class="dim-name">常规型 <span class="dim-code">Conventional</span></span>
          <span class="dim-pct" id="pctC">20%</span>
        </div>
        <input type="range" class="c" id="slC" min="0" max="100" value="20" oninput="updatePct('C',this.value)" />
      </div>
    </div>
  </div>

  <!-- MBTI -->
  <div class="section">
    <div class="section-title"><span>🧠</span>MBTI 性格类型</div>
    <div class="mbti-grid">
      <div class="mbti-pair">
        <div class="mbti-label">外向 ←→ 内向<br><strong id="lblEI">?</strong></div>
        <div class="mbti-btns">
          <button class="mbti-btn" data-dim="EI" data-val="E" onclick="selectMBTI(this)">E 外向</button>
          <button class="mbti-btn" data-dim="EI" data-val="I" onclick="selectMBTI(this)">I 内向</button>
        </div>
      </div>
      <div class="mbti-pair">
        <div class="mbti-label">实感 ←→ 直觉<br><strong id="lblSN">?</strong></div>
        <div class="mbti-btns">
          <button class="mbti-btn" data-dim="SN" data-val="S" onclick="selectMBTI(this)">S 实感</button>
          <button class="mbti-btn" data-dim="SN" data-val="N" onclick="selectMBTI(this)">N 直觉</button>
        </div>
      </div>
      <div class="mbti-pair">
        <div class="mbti-label">思考 ←→ 情感<br><strong id="lblTF">?</strong></div>
        <div class="mbti-btns">
          <button class="mbti-btn" data-dim="TF" data-val="T" onclick="selectMBTI(this)">T 思考</button>
          <button class="mbti-btn" data-dim="TF" data-val="F" onclick="selectMBTI(this)">F 情感</button>
        </div>
      </div>
      <div class="mbti-pair">
        <div class="mbti-label">判断 ←→ 知觉<br><strong id="lblJP">?</strong></div>
        <div class="mbti-btns">
          <button class="mbti-btn" data-dim="JP" data-val="J" onclick="selectMBTI(this)">J 判断</button>
          <button class="mbti-btn" data-dim="JP" data-val="P" onclick="selectMBTI(this)">P 知觉</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 按钮 -->
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="resetForm()">🔄 重置</button>
    <button class="btn btn-primary" onclick="generate()">🚀 生成报告</button>
  </div>
</div>

<!-- ══════════ REPORT PHASE ══════════ -->
<div id="reportPhase" class="report-wrap">
  <!-- 由 JS 填充 -->
</div>

<script>
// ── State ──────────────────────────────────
const mbtiState = { EI: null, SN: null, TF: null, JP: null };

// ── Init ───────────────────────────────────
document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);

// ── Holland slider ───────────────────────────
function updatePct(dim, val) {
  document.getElementById('pct' + dim).textContent = val + '%';
}

// ── MBTI select ──────────────────────────────
function selectMBTI(btn) {
  const dim = btn.dataset.dim;
  const val = btn.dataset.val;
  mbtiState[dim] = val;
  // Update label
  const labelMap = { EI: { E: '外向 E', I: '内向 I' }, SN: { S: '实感 S', N: '直觉 N' },
    TF: { T: '思考 T', F: '情感 F' }, JP: { J: '判断 J', P: '知觉 P' } };
  document.getElementById('lbl' + dim).textContent = labelMap[dim][val];
  // Style
  document.querySelectorAll('[data-dim="'+dim+'"]').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ── Reset ───────────────────────────────────
function resetForm() {
  ['I','S','R','A','E','C'].forEach(d => { document.getElementById('sl'+d).value = {I:70,S:60,R:50,A:40,E:30,C:20}[d]; updatePct(d, document.getElementById('sl'+d).value); });
  ['EI','SN','TF','JP'].forEach(d => {
    mbtiState[d] = null;
    document.getElementById('lbl'+d).textContent = '?';
    document.querySelectorAll('[data-dim="'+d+'"]').forEach(b => b.classList.remove('selected'));
  });
  document.getElementById('inputName').value = '';
  document.getElementById('inputGrade').value = '';
}

// ── Holland data ────────────────────────────
const HOLLAND_PROFS = {

  IRE: { name:'调研-实际-企业', p0:'机械工程/土木工程', p1:'电气工程/CS', p2:'建筑学' },
  IRA: { name:'调研-实际-艺术', p0:'生物医学工程/药学', p1:'化学工程/材料科学', p2:'生物技术' },
  IRS: { name:'调研-实际-社会', p0:'医学预科/护理', p1:'运动科学/康复医学', p2:'公共卫生' },
  RIA: { name:'实际-调研-艺术', p0:'机械工程/航空航天', p1:'电气工程/机器人', p2:'材料工程' },

  AIR: { name:'艺术-调研-实际', p0:'建筑学/工业设计', p1:'计算机图形学', p2:'游戏设计' },

  ARE: { name:'艺术-实际-企业', p0:'时尚管理/奢侈品牌', p1:'服装设计+商业', p2:'零售管理' },

function downloadReport() {
